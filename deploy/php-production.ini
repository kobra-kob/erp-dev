; ArtisanFlow — réglages PHP de production (OPcache + JIT + cache de chemins).
; Installé par deploy/install.sh dans /etc/php/8.4/apache2/conf.d/99-artisanflow.ini
; Objectif : éliminer la recompilation du bytecode et les appels stat() à chaque requête.

; --- Limites (upload de photos produits / pièces jointes) ---
upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 512M
max_execution_time = 60
date.timezone = Europe/Paris

; --- OPcache : bytecode gardé en mémoire ---
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 30000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 60          ; relit le disque au plus une fois/min (quasi 0 surcoût)
opcache.save_comments = 1             ; requis : attributs PHP #[Fillable] etc.
opcache.fast_shutdown = 1

; --- JIT (PHP 8.4) : accélère le code CPU ---
opcache.jit = tracing
opcache.jit_buffer_size = 128M

; --- Cache des chemins résolus : limite fortement les stat() ---
realpath_cache_size = 8192K
realpath_cache_ttl = 600
