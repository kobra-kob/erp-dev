# =====================================================================
#  Paramètres applicatifs ArtisanFlow pour zabbix-agent2
#  À déposer dans : /etc/zabbix/zabbix_agent2.d/artisanflow.conf
#  Puis : systemctl restart zabbix-agent2
#
#  Les métriques système (CPU, RAM, disque) et services (Apache, MariaDB)
#  sont fournies par les templates standard Zabbix — voir DEPLOYMENT.md.
#  Ci-dessous : métriques propres à l'application.
# =====================================================================

# Santé HTTP de l'application (endpoint /up de Laravel). Renvoie 200 si OK.
UserParameter=artisanflow.health,curl -s -o /dev/null -w '%{http_code}' -k https://localhost/up

# Nombre de factures impayées (alerte métier). Adapter le chemin si besoin.
UserParameter=artisanflow.invoices.unpaid,sudo -u www-data php /var/www/artisanflow/artisan tinker --execute="echo \App\Models\Invoice::withoutGlobalScopes()->whereIn('status',['unpaid','partial'])->count();" 2>/dev/null | tail -1

# Taille de la file d'attente des jobs (si QUEUE_CONNECTION=database).
UserParameter=artisanflow.queue.size,mysql -N -B -e "SELECT COUNT(*) FROM jobs" artisanflow 2>/dev/null
