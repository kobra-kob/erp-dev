# =====================================================================
#  ArtisanFlow ERP — VirtualHost Apache de production (Debian)
#  À placer dans : /etc/apache2/sites-available/artisanflow.conf
#  Puis : a2ensite artisanflow && systemctl reload apache2
#
#  Remplacez artisanflow.example.com par votre nom de domaine.
#  Le bloc :443 peut être généré/complété automatiquement par Certbot
#  (certbot --apache) ; il est fourni ici en version manuelle complète.
# =====================================================================

# --- HTTP : redirige tout vers HTTPS (sauf le challenge ACME) ---
<VirtualHost *:80>
    ServerName artisanflow.example.com
    DocumentRoot /var/www/artisanflow/public

    # Laisser passer la validation Let's Encrypt
    Alias /.well-known/acme-challenge/ /var/www/artisanflow/public/.well-known/acme-challenge/
    <Directory "/var/www/artisanflow/public/.well-known/acme-challenge/">
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# --- HTTPS : application ---
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName artisanflow.example.com
    DocumentRoot /var/www/artisanflow/public

    <Directory /var/www/artisanflow/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # --- TLS (chemins gérés par Certbot) ---
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/artisanflow.example.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/artisanflow.example.com/privkey.pem
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off

    # --- En-têtes de sécurité (complètent le middleware applicatif) ---
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "same-origin"
    ServerSignature Off

    # --- Compression ---
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/javascript application/json image/svg+xml
    </IfModule>

    # --- Cache long pour les assets statiques ---
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType image/png "access plus 1 month"
        ExpiresByType image/svg+xml "access plus 1 month"
        ExpiresByType image/x-icon "access plus 1 year"
    </IfModule>

    # Bloquer l'accès aux fichiers sensibles éventuellement exposés
    <FilesMatch "^\.(env|gitignore|gitattributes)$">
        Require all denied
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/artisanflow-error.log
    CustomLog ${APACHE_LOG_DIR}/artisanflow-access.log combined
</VirtualHost>
</IfModule>
